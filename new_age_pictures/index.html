<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Picture Quiz Sample</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    img {
      max-width: 400px;
      margin-top: 20px;
      border: 2px solid #333;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
      cursor: pointer;
    }
    h2 {
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Picture Quiz Sample</h1>
  <h2 id="question"></h2>
  <img id="quizImage" src="" alt="quiz">

  <div>
    <button onclick="nextPicture()">Next Picture</button>
  </div>

  <script>
    // Sample data: each picture has its own question
    const quizData = [
      { image: "https://upload.wikimedia.org/wikipedia/commons/1/15/Red_Apple.jpg", question: "What fruit is this?" },
      { image: "https://upload.wikimedia.org/wikipedia/commons/8/88/Banana-Single.jpg", question: "Which fruit is long and yellow?" },
      { image: "https://upload.wikimedia.org/wikipedia/commons/c/c4/Orange-Fruit-Pieces.jpg", question: "What citrus fruit is this?" },
      { image: "https://upload.wikimedia.org/wikipedia/commons/9/9b/Strawberry_on_white_background.jpg", question: "Name this small red fruit." },
      { image: "https://upload.wikimedia.org/wikipedia/commons/f/f7/Pineapple_and_cross_section.jpg", question: "Which tropical fruit is this?" }
    ];

    let currentIndex = 0;

    function showPicture(index) {
      const quizImage = document.getElementById("quizImage");
      const question = document.getElementById("question");
      quizImage.src = quizData[index].image;
      question.textContent = quizData[index].question;
    }

    function nextPicture() {
      currentIndex++;
      if (currentIndex >= quizData.length) {
        currentIndex = 0; // loop back to first picture
      }
      showPicture(currentIndex);
    }

    // Show first picture on page load
    showPicture(currentIndex);
  </script>

</body>
</html>
