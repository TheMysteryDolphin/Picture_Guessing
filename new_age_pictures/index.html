<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4x4 Picture Quiz Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    h1, h2 {
      margin: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
      justify-items: center;
      margin-top: 20px;
    }
    .grid img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border: 2px solid #333;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin-top: 20px;
      font-size: 18px;
      cursor: pointer;
    }
    #summary {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>4x4 Picture Quiz</h1>
  <h2 id="question">Click "Next Picture" to start!</h2>
  <img id="quizImage" src="" alt="quiz" style="max-width:400px; margin-top:20px;">

  <div>
    <button onclick="nextPicture()">Next Picture</button>
  </div>

  <div id="summary">
    <h2>Quiz Complete!</h2>
    <p>Answer this final question: Which picture did you like the most?</p>
  </div>

  <script>
    // 16 pictures with questions (you can replace URLs with your own)
    const quizData = [
      { image: "apple.jpg", question: "What fruit is this?" }
    ];

    let currentIndex = 0;
    let shuffledData = [];

    // Shuffle the quizData for randomness
    function shuffleArray(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function showPicture(index) {
      if (index >= shuffledData.length) {
        document.getElementById("quizImage").style.display = "none";
        document.getElementById("question").style.display = "none";
        document.getElementById("summary").style.display = "block";
        return;
      }
      const quizImage = document.getElementById("quizImage");
      const question = document.getElementById("question");
      quizImage.src = shuffledData[index].image;
      question.textContent = shuffledData[index].question;
    }

    function nextPicture() {
      currentIndex++;
      showPicture(currentIndex);
    }

    // Start the quiz
    shuffledData = shuffleArray(quizData);
    showPicture(currentIndex);

  </script>

</body>
</html>
