<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>宗教图片猜谜游戏</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: Arial, sans-serif; text-align: center; background: #00008B; padding: 20px; }
  h1 { color: #ADD8E6; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); width: 480px; height: 480px; margin: 20px auto; gap: 3px; }
  .tile { background-size: 480px 480px; background-color: #ADD8E6; cursor: pointer; }
  .hidden { background-image: none !important; }
  .revealed { pointer-events: none; }
  button { padding: 8px 14px; margin: 6px; background: #ADD8E6; color: white; border: none; cursor: pointer; border-radius: 4px; }
  button:hover { opacity: 0.9; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #result { margin-top: 10px; font-weight: bold; color: #ADD8E6; }
  @media (max-width: 600px) { .grid { width: 90vw; height: 90vw; } .tile { background-size: 90vw 90vw; } }
</style>
</head>
<body>

<h1>图片猜猜看</h1>
<p>点击方块揭开图片</p>

<div class="grid" id="grid"></div>

<div>
  <button id="revealBtn" onclick="revealAll()">全部显示</button>
</div>

<div>
  <button id="backBtn" onclick="prevImage()">⬅ 返回 </button>
  <button id="nextBtn" onclick="nextImage()">继续 ➡</button>
</div>

<p id="result"></p>

<script>
const pictures = [
  { src: "yoga.jpg", name: "你认为这个活动属于哪个宗教？" },
  { src: "taichi.jpg", name: "你有练过这种武术吗？" },
  { src: "love.jpg", name: "谈谈你对“爱”的看法。" },
  { src: "universe.jpg", name: "你认为宇宙是由某个人或力量创造的吗？" },
  { src: "invite.png", name: "我们将举办 咖啡聚会，一起聊聊关于信仰的问题。如果你有兴趣，请扫描下方二维码报名参加。" },
];

const GRID_SIZE = 5;
const TILE_COUNT = GRID_SIZE * GRID_SIZE;

const normalMessage = "Click tiles to reveal the picture";

let current = 0;
const grid = document.getElementById("grid");
const result = document.getElementById("result");
const revealBtn = document.getElementById("revealBtn");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");

function loadImage() {
  grid.innerHTML = "";

  // Control buttons and messages
  backBtn.disabled = current === 0;
  nextBtn.disabled = current === pictures.length - 1;
  backBtn.style.opacity = backBtn.disabled ? "0.5" : "1";
  nextBtn.style.opacity = nextBtn.disabled ? "0.5" : "1";
  revealBtn.style.display = "inline-block";
  result.textContent = normalMessage;

  const gridSizePx = grid.offsetWidth;
  const tileSize = gridSizePx / GRID_SIZE;

  for (let i = 0; i < TILE_COUNT; i++) {
    const tile = document.createElement("div");
    tile.className = "tile hidden";
    tile.style.backgroundImage = `url(${pictures[current].src})`;
    const x = (i % GRID_SIZE) * -tileSize;
    const y = Math.floor(i / GRID_SIZE) * -tileSize;
    tile.style.backgroundPosition = `${x}px ${y}px`;

    tile.onclick = () => handleTileClick(tile);
    grid.appendChild(tile);
  }
}

function handleTileClick(tile) {
  tile.classList.remove("hidden");
  checkComplete();
}

function checkComplete() {
  const hiddenTiles = document.querySelectorAll(".tile.hidden");
  if (hiddenTiles.length === 0) {
    result.textContent = `🎉 ${pictures[current].name}`;
  }
}

function revealAll() {
  document.querySelectorAll(".tile").forEach(t => t.classList.remove("hidden"));
  result.textContent = `🎉 ${pictures[current].name}`;
}

function nextImage() {
  if (current < pictures.length - 1) {
    current++;
    loadImage();
  }
}

function prevImage() {
  if (current > 0) {
    current--;
    loadImage();
  }
}

window.addEventListener("resize", loadImage);
loadImage();
</script>
</body>
</html>
